name: Flutter Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - uses: actions/checkout@v4

      # 2. Устанавливаем Flutter SDK (вместо обычного Dart)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # или укажите нужную версию, например: '3.22.0'

      # 3. Теперь команда отработает корректно
      - name: Install dependencies
        run: flutter pub get

      # 4. (Опционально) Проверка кода или запуск тестов
      - name: Run tests
        run: flutter test
