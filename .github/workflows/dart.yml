name: Flutter CI

# Скрипт запускается при каждом пуше или пулл-реквесте в ветки "main" и "master"
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_windows:
    # Меняем сервер на Windows, чтобы была доступна сборка .exe
    runs-on: windows-latest

    steps:
      # 1. Клонируем репозиторий с вашим кодом на виртуальную машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Flutter SDK нужной версии (вместо некорректного Dart SDK)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Автоматически скачает последнюю стабильную версию Flutter
          cache: true       # Включает кеширование для ускорения последующих сборок

      # 3. Скачиваем все зависимости, указанные в вашем pubspec.yaml
      - name: Install dependencies
        run: flutter pub get

      # 4. Проверяем код на наличие ошибок и предупреждений (Linter)
      - name: Analyze project source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 5. Запускаем юнит-тесты проекта
      # - name: Run tests
      #   run: flutter test

      - name: Build Windows App
        run: flutter build windows

      # 6. Упаковываем результат в архив и прикрепляем к сборке
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-notepad-app
          path: build/windows/x64/runner/Release/
